services:
  - type: web
    runtime: node
    name: ecommerce-admin-dashboard
    plan: free
    buildCommand: rm -rf .adminjs && npm install
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
