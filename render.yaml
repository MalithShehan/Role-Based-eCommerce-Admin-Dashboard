databases:
  - name: ecommerce-admin-db
    databaseName: ecommerce_admin
    plan: free

services:
  - type: web
    name: ecommerce-admin-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-admin-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
